version: 0.1
log:
  level: debug
  fields:
    service: registry
    environment: development
auth:
  htpasswd:
    realm: Registry
    path: /etc/docker/registry/htpasswd
storage:
    delete:
      enabled: true
    cache:
        blobdescriptor: inmemory
    filesystem:
        rootdirectory: /var/lib/registry
    tag:
      concurrencylimit: 5
http:
    addr: :5000
    debug:
        addr: :5001
        prometheus:
            enabled: true
            path: /metrics
health:
  storagedriver:
    enabled: true
    interval: 10s
    threshold: 3
